services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: base_dados_celular_2005
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2006
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: base_dados_celular_2005
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2006
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
