<header>
    <h1>📊 DataMobile Dashboard</h1>
    <p>Posse de telefone móvel celular para uso pessoal - 2005</p>
</header>

<main class="container">

    <section class="cards">
        <div class="card">
            <h3>Total de Registros</h3>
            <span id="total">0</span>
        </div>

        <div class="card">
            <h3>Maior posse do Brasil</h3>
            <span id="max">0</span>
        </div>
    </section>

    <section class="table-section">
        <h2>Dados por Faixa Etária</h2>

        <table>
            <thead>
                <tr>
                    <th>Grupo Idade</th>
                    <th>Brasil</th>
                    <th>Norte</th>
                    <th>Nordeste</th>
                    <th>Sudeste</th>
                    <th>Sul</th>
                    <th>Centro-Oeste</th>
                </tr>
            </thead>

            <tbody id="tabela-body">
            </tbody>
        </table>
    </section>

</main>

<script src="script.js"></script>
